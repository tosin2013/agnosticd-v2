---
# Deploy Capacity Planning Workshop

# ============================================================
# Pre-workload validation
# ============================================================

- name: Validate OpenShift GitOps is installed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: openshift-gitops
  register: r_gitops_csv
  failed_when: r_gitops_csv.resources | length == 0
  retries: 5
  delay: 10
  until: r_gitops_csv.resources | length > 0

- name: Validate storage class exists (for RHACM observability)
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: "{{ ocp4_workload_capacity_planning_workshop_rhacm_storage_class }}"
  register: r_storage_class
  failed_when: r_storage_class.resources | length == 0

- name: Display workshop deployment information
  ansible.builtin.debug:
    msg: |
      ============================================================
      Deploying Strategic Capacity Planning & Forecasting Workshop
      ============================================================
      Namespace: {{ ocp4_workload_capacity_planning_workshop_namespace }}
      GUID: {{ guid }}
      Cluster Domain: {{ openshift_cluster_ingress_domain | default('N/A') }}

      Mode: {{ 'Multi-User (' ~ ocp4_workload_capacity_planning_workshop_num_users ~ ' users)' if ocp4_workload_capacity_planning_workshop_multiuser else 'Single-User' }}
      {% if ocp4_workload_capacity_planning_workshop_multiuser %}
      Architecture: SNO VMs via OpenShift Virtualization
      SNO Resources: {{ ocp4_workload_capacity_planning_workshop_sno_vcpu }} vCPU, {{ ocp4_workload_capacity_planning_workshop_sno_memory }} RAM
      {% endif %}

      Components:
      - RHACM: {{ ocp4_workload_capacity_planning_workshop_deploy_rhacm }}
      - OpenShift Virtualization: {{ ocp4_workload_capacity_planning_workshop_deploy_virtualization }}
      - Monitoring Config: {{ ocp4_workload_capacity_planning_workshop_deploy_monitoring }}
      - Sample Apps: {{ ocp4_workload_capacity_planning_workshop_deploy_sample_apps }}
      - Simulation Toolkit: {{ ocp4_workload_capacity_planning_workshop_deploy_simulation }}
      - Showroom: {{ ocp4_workload_capacity_planning_workshop_deploy_showroom }}
      ============================================================

# ============================================================
# Main deployment
# ============================================================

# Step 1: Deploy RHACM using AgnosticD core_workloads role
- name: Deploy RHACM operator and MultiClusterHub
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  ansible.builtin.include_role:
    name: agnosticd.core_workloads.ocp4_workload_rhacm
  vars:
    ocp4_workload_rhacm_acm_channel: "{{ ocp4_workload_capacity_planning_workshop_rhacm_channel }}"

# Step 1b: Install OpenShift Virtualization (for multi-user SNO VMs)
- name: Install OpenShift Virtualization
  when: ocp4_workload_capacity_planning_workshop_deploy_virtualization | bool
  ansible.builtin.include_tasks: install_virtualization.yml

# Step 1c: Provision SNO VMs via Hive + KubeVirt (multi-user mode)
- name: Provision SNO VMs for multi-user workshop
  when: ocp4_workload_capacity_planning_workshop_multiuser | bool
  ansible.builtin.include_tasks: provision_sno_vms.yml

# Step 1d: Claim SNO clusters from pool (multi-user mode)
- name: Claim SNO clusters for workshop users
  when: ocp4_workload_capacity_planning_workshop_multiuser | bool
  ansible.builtin.include_tasks: claim_sno_clusters.yml

# Step 2: Get NooBaa S3 credentials for Thanos
- name: Get NooBaa admin secret
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: noobaa-admin
    namespace: openshift-storage
  register: r_noobaa_secret

- name: Get NooBaa S3 route
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: s3
    namespace: openshift-storage
  register: r_s3_route

- name: Set NooBaa credentials
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  ansible.builtin.set_fact:
    noobaa_access_key: "{{ r_noobaa_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    noobaa_secret_key: "{{ r_noobaa_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
    noobaa_endpoint: "{{ r_s3_route.resources[0].spec.host }}"

# Step 3: Create OBC for RHACM metrics
- name: Create ObjectBucketClaim for RHACM metrics
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: objectbucket.io/v1alpha1
      kind: ObjectBucketClaim
      metadata:
        name: rhacm-metrics-bucket
        namespace: open-cluster-management
      spec:
        generateBucketName: rhacm-metrics
        storageClassName: openshift-storage.noobaa.io

- name: Wait for ObjectBucketClaim to be bound
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s_info:
    api_version: objectbucket.io/v1alpha1
    kind: ObjectBucketClaim
    name: rhacm-metrics-bucket
    namespace: open-cluster-management
  register: r_obc
  retries: 30
  delay: 5
  until:
    - r_obc.resources is defined
    - r_obc.resources | length > 0
    - r_obc.resources[0].status is defined
    - r_obc.resources[0].status.phase is defined
    - r_obc.resources[0].status.phase == "Bound"

- name: Get bucket name from OBC
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  ansible.builtin.set_fact:
    rhacm_bucket_name: "{{ r_obc.resources[0].spec.bucketName }}"

# Step 4: Configure RHACM Observability
- name: Create Thanos object storage secret
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: thanos-object-storage
        namespace: open-cluster-management
      type: Opaque
      stringData:
        thanos.yaml: |
          type: s3
          config:
            bucket: "{{ rhacm_bucket_name }}"
            endpoint: "{{ noobaa_endpoint }}"
            insecure: false
            access_key: "{{ noobaa_access_key }}"
            secret_key: "{{ noobaa_secret_key }}"

- name: Deploy RHACM MultiClusterObservability
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: observability.open-cluster-management.io/v1beta2
      kind: MultiClusterObservability
      metadata:
        name: observability
        namespace: open-cluster-management
      spec:
        observabilityAddonSpec:
          enableMetrics: true
        storageConfig:
          metricObjectStorage:
            name: thanos-object-storage
            key: thanos.yaml
          storageClass: "{{ ocp4_workload_capacity_planning_workshop_rhacm_storage_class }}"
          retentionConfig:
            retentionInLocal: "{{ ocp4_workload_capacity_planning_workshop_rhacm_retention_local }}"
            retentionResolutionRaw: "{{ ocp4_workload_capacity_planning_workshop_rhacm_retention_resolution }}"

- name: Wait for RHACM Observability to be ready
  when: ocp4_workload_capacity_planning_workshop_deploy_rhacm | bool
  kubernetes.core.k8s_info:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: observability
    namespace: open-cluster-management
  register: r_mco
  retries: 60
  delay: 15
  until:
    - r_mco.resources is defined
    - r_mco.resources | length > 0
    - r_mco.resources[0].status is defined
    - r_mco.resources[0].status.conditions is defined
    - r_mco.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | list | first == 'True'

# Step 3: Create workshop namespace (single-user mode on hub cluster)
- name: Create workshop namespace on hub cluster
  when: not ocp4_workload_capacity_planning_workshop_multiuser | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
        labels:
          demo.redhat.com/application: capacity-workshop
          demo.redhat.com/guid: "{{ guid }}"

# Step 4: Deploy workshop components via ArgoCD
# Single-user mode: Deploy to hub cluster
- name: Deploy workshop via ArgoCD to hub cluster (single-user)
  when: not ocp4_workload_capacity_planning_workshop_multiuser | bool
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argocd-application.yaml.j2') }}"
  vars:
    _showroom_namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
    _target_cluster: "https://kubernetes.default.svc"
    _user: ""

- name: Wait for ArgoCD Application to sync (single-user)
  when: not ocp4_workload_capacity_planning_workshop_multiuser | bool
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: capacity-planning-workshop
    namespace: openshift-gitops
  register: r_argocd_app
  retries: 60
  delay: 10
  until:
    - r_argocd_app.resources is defined
    - r_argocd_app.resources | length > 0
    - r_argocd_app.resources[0].status is defined
    - r_argocd_app.resources[0].status.sync.status == "Synced"

# Multi-user mode: Deploy to SNO clusters
- name: Register SNO clusters as ArgoCD remote clusters
  when: ocp4_workload_capacity_planning_workshop_multiuser | bool
  vars:
    _user_number: "{{ _n | int + 1 }}"
    _user: "{{ ocp4_workload_capacity_planning_workshop_user_basename ~ _user_number }}"
    _sno_namespace: "{{ r_cluster_claims.results[_n].resources[0].spec.namespace }}"
    _sno_kubeconfig: "{{ r_sno_kubeconfigs.results[_n].resources[0].data.kubeconfig | b64decode }}"
    _sno_api_url: "{{ r_managed_clusters.results[_n].resources[0].spec.managedClusterClientConfigs[0].url }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ guid }}-{{ _user }}-cluster"
        namespace: openshift-gitops
        labels:
          argocd.argoproj.io/secret-type: cluster
      type: Opaque
      stringData:
        name: "{{ guid }}-{{ _user }}"
        server: "{{ _sno_api_url }}"
        config: |
          {
            "bearerToken": "",
            "tlsClientConfig": {
              "insecure": false,
              "caData": ""
            }
          }
  loop: "{{ range(0, ocp4_workload_capacity_planning_workshop_num_users | int) | list }}"
  loop_control:
    loop_var: _n
    label: "{{ _user }}"

- name: Deploy workshop via ArgoCD to SNO clusters (multi-user)
  when: ocp4_workload_capacity_planning_workshop_multiuser | bool
  vars:
    _user_number: "{{ _n | int + 1 }}"
    _user: "{{ ocp4_workload_capacity_planning_workshop_user_basename ~ _user_number }}"
    _sno_namespace: "{{ r_cluster_claims.results[_n].resources[0].spec.namespace }}"
    _showroom_namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
    _target_cluster: "{{ r_managed_clusters.results[_n].resources[0].spec.managedClusterClientConfigs[0].url }}"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argocd-application.yaml.j2') }}"
  loop: "{{ range(0, ocp4_workload_capacity_planning_workshop_num_users | int) | list }}"
  loop_control:
    loop_var: _n
    label: "{{ _user }}"

- name: Wait for ArgoCD Applications to sync on SNO clusters (multi-user)
  when: ocp4_workload_capacity_planning_workshop_multiuser | bool
  vars:
    _user_number: "{{ _n | int + 1 }}"
    _user: "{{ ocp4_workload_capacity_planning_workshop_user_basename ~ _user_number }}"
    _app_name: "capacity-planning-workshop-{{ _user }}"
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ _app_name }}"
    namespace: openshift-gitops
  register: r_argocd_apps_multi
  retries: 60
  delay: 10
  until:
    - r_argocd_apps_multi.resources is defined
    - r_argocd_apps_multi.resources | length > 0
    - r_argocd_apps_multi.resources[0].status is defined
    - r_argocd_apps_multi.resources[0].status.sync.status == "Synced"
  loop: "{{ range(0, ocp4_workload_capacity_planning_workshop_num_users | int) | list }}"
  loop_control:
    loop_var: _n
    label: "{{ _user }}"

- name: Wait for sample applications to be ready (single-user)
  when:
    - ocp4_workload_capacity_planning_workshop_deploy_sample_apps | bool
    - not ocp4_workload_capacity_planning_workshop_multiuser | bool
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
    label_selectors:
      - demo.redhat.com/application=capacity-workshop
  register: r_sample_apps
  retries: 30
  delay: 10
  until:
    - r_sample_apps.resources is defined
    - r_sample_apps.resources | length > 0
    - >-
      r_sample_apps.resources
      | selectattr('spec.replicas', 'defined')
      | selectattr('spec.replicas', 'gt', 0)
      | selectattr('status.availableReplicas', 'defined')
      | list
      | length
      ==
      r_sample_apps.resources
      | selectattr('spec.replicas', 'defined')
      | selectattr('spec.replicas', 'gt', 0)
      | list
      | length

# ============================================================
# Post-workload configuration
# ============================================================

- name: Get Showroom route URL
  when: ocp4_workload_capacity_planning_workshop_deploy_showroom | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: showroom
    namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
  register: r_showroom_route
  retries: 30
  delay: 10
  until:
    - r_showroom_route.resources is defined
    - r_showroom_route.resources | length > 0

- name: Set showroom URL fact
  when:
    - ocp4_workload_capacity_planning_workshop_deploy_showroom | bool
    - r_showroom_route.resources | length > 0
  ansible.builtin.set_fact:
    showroom_url: "https://{{ r_showroom_route.resources[0].spec.host }}"

- name: Create userinfo ConfigMap with workshop access details
  when: ocp4_workload_capacity_planning_workshop_deploy_showroom | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: userinfo
        namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
        labels:
          demo.redhat.com/userinfo: "true"
      data:
        workshop_url: "{{ showroom_url | default('') }}"
        cluster_domain: "{{ openshift_cluster_ingress_domain | default('') }}"
        namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
        guid: "{{ guid }}"
        rhacm_console: "https://multicloud-console.apps.{{ openshift_cluster_ingress_domain | default('') }}"
        grafana_url: "https://grafana-open-cluster-management-observability.apps.{{ openshift_cluster_ingress_domain | default('') }}"

- name: Print workshop access information
  ansible.builtin.debug:
    msg: |
      ============================================================
      Workshop deployed successfully!
      ============================================================

      Access the lab guide at:
      {{ showroom_url | default('Showroom URL pending...') }}

      RHACM Console:
      https://multicloud-console.apps.{{ openshift_cluster_ingress_domain | default('N/A') }}

      Grafana (Observability):
      https://grafana-open-cluster-management-observability.apps.{{ openshift_cluster_ingress_domain | default('N/A') }}

      Namespace: {{ ocp4_workload_capacity_planning_workshop_namespace }}
      GUID: {{ guid }}
      ============================================================

# ============================================================
# Export user info for RHDP catalog
# ============================================================

- name: Export workshop access information to agnosticd_user_info
  when: ocp4_workload_capacity_planning_workshop_deploy_showroom | bool
  agnosticd.core.agnosticd_user_info:
    msg: |
      Capacity Planning Workshop has been deployed successfully.

      Access your lab guide at: {{ showroom_url | default('Showroom URL not available') }}
    data:
      showroom_url: "{{ showroom_url | default('') }}"
      workshop_url: "{{ showroom_url | default('') }}"
      openshift_console_url: "{{ openshift_console_url | default('') }}"
      openshift_api_url: "{{ openshift_api_url | default('') }}"
      cluster_ingress_domain: "{{ openshift_cluster_ingress_domain | default('') }}"
      namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
      guid: "{{ guid }}"
      rhacm_console: "https://multicloud-console.apps.{{ openshift_cluster_ingress_domain | default('') }}"
      grafana_url: "https://grafana-open-cluster-management-observability.apps.{{ openshift_cluster_ingress_domain | default('') }}"

- name: Export workshop access information when Showroom is disabled
  when: not (ocp4_workload_capacity_planning_workshop_deploy_showroom | bool)
  agnosticd.core.agnosticd_user_info:
    msg: |
      Capacity Planning Workshop has been deployed successfully.
      Showroom lab guide was not deployed.
    data:
      openshift_console_url: "{{ openshift_console_url | default('') }}"
      openshift_api_url: "{{ openshift_api_url | default('') }}"
      cluster_ingress_domain: "{{ openshift_cluster_ingress_domain | default('') }}"
      namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
      guid: "{{ guid }}"
      rhacm_console: "https://multicloud-console.apps.{{ openshift_cluster_ingress_domain | default('') }}"
      grafana_url: "https://grafana-open-cluster-management-observability.apps.{{ openshift_cluster_ingress_domain | default('') }}"
