---
# Deploy Capacity Planning Workshop
# Hub-Student topology split:
#   hub_mode: true  → RHACM + Observability only (hub cluster)
#   hub_mode: false → Sample apps + monitoring + simulation (student cluster)

# ============================================================
# Pre-workload validation (both hub and student)
# ============================================================

- name: Validate OpenShift GitOps is installed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: openshift-gitops
  register: r_gitops_csv
  failed_when: r_gitops_csv.resources | length == 0
  retries: 5
  delay: 10
  until: r_gitops_csv.resources | length > 0

- name: Validate storage class exists for RHACM Observability (hub only)
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: "{{ ocp4_workload_capacity_planning_workshop_rhacm_storage_class }}"
  register: r_storage_class
  failed_when: r_storage_class.resources | length == 0

- name: Display workshop deployment information
  ansible.builtin.debug:
    msg: |
      ============================================================
      Deploying Strategic Capacity Planning & Forecasting Workshop
      ============================================================
      Mode:             {{ 'HUB (RHACM + Observability)' if ocp4_workload_capacity_planning_workshop_hub_mode | bool else 'STUDENT (apps + monitoring + simulation)' }}
      GUID:             {{ guid }}
      Cluster Domain:   {{ openshift_cluster_ingress_domain | default('N/A') }}

      {% if ocp4_workload_capacity_planning_workshop_hub_mode | bool %}
      Hub components to deploy:
        - RHACM + MultiClusterHub
        - RHACM Observability (Thanos → S3, Grafana fleet view)
      Thanos storage class: {{ ocp4_workload_capacity_planning_workshop_rhacm_storage_class }}
      Thanos S3 bucket:     {{ ocp4_workload_capacity_planning_workshop_rhacm_thanos_bucket }}
      {% else %}
      Student components to deploy:
        - Workshop namespace + ArgoCD Application
        - Sample Apps (QoS demos, HPA, load-gen, noisy-neighbor)
        - Monitoring config (Prometheus rules, PromQL dashboards)
        - Simulation toolkit
      Hub RHACM URL (for Module 5 import): {{ ocp4_workload_capacity_planning_workshop_hub_rhacm_url | default('not set — inject post-hub-provision') }}
      {% endif %}
      ============================================================

# ============================================================
# HUB PATH — RHACM + Observability
# ============================================================

# Step H-1: Deploy RHACM operator and MultiClusterHub
- name: "[HUB] Deploy RHACM operator and MultiClusterHub"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.include_role:
    name: agnosticd.core_workloads.ocp4_workload_rhacm
  vars:
    ocp4_workload_rhacm_acm_channel: "{{ ocp4_workload_capacity_planning_workshop_rhacm_channel }}"

# Step H-2: Detect storage backend for Thanos
# Supports NooBaa/OCS (on-prem) and AWS native S3 (hub-student topology)
- name: "[HUB] Check if NooBaa is available (OCS storage detection)"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: noobaa-admin
    namespace: openshift-storage
  register: r_noobaa_secret
  ignore_errors: true

- name: "[HUB] Set storage backend fact"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.set_fact:
    _rhacm_use_noobaa: >-
      {{ r_noobaa_secret.resources is defined and r_noobaa_secret.resources | length > 0 }}

- name: "[HUB] Display detected Thanos storage backend"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.debug:
    msg: "RHACM Thanos backend: {{ 'NooBaa/OCS' if _rhacm_use_noobaa else 'AWS S3 (native)' }}"

# Step H-2a: NooBaa path — OCS/on-prem credentials
- name: "[HUB] Get NooBaa S3 route"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - _rhacm_use_noobaa | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: s3
    namespace: openshift-storage
  register: r_s3_route

- name: "[HUB] Set NooBaa Thanos credentials"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - _rhacm_use_noobaa | bool
  ansible.builtin.set_fact:
    _thanos_access_key: "{{ r_noobaa_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    _thanos_secret_key: "{{ r_noobaa_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
    _thanos_endpoint: "{{ r_s3_route.resources[0].spec.host }}"
    _thanos_insecure: false

- name: "[HUB] Create ObjectBucketClaim for RHACM metrics (NooBaa)"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - _rhacm_use_noobaa | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: objectbucket.io/v1alpha1
      kind: ObjectBucketClaim
      metadata:
        name: rhacm-metrics-bucket
        namespace: open-cluster-management
      spec:
        generateBucketName: rhacm-metrics
        storageClassName: openshift-storage.noobaa.io

- name: "[HUB] Wait for ObjectBucketClaim to be bound (NooBaa)"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - _rhacm_use_noobaa | bool
  kubernetes.core.k8s_info:
    api_version: objectbucket.io/v1alpha1
    kind: ObjectBucketClaim
    name: rhacm-metrics-bucket
    namespace: open-cluster-management
  register: r_obc
  retries: 30
  delay: 5
  until:
    - r_obc.resources is defined
    - r_obc.resources | length > 0
    - r_obc.resources[0].status is defined
    - r_obc.resources[0].status.phase is defined
    - r_obc.resources[0].status.phase == "Bound"

- name: "[HUB] Set Thanos bucket name from OBC (NooBaa auto-generates)"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - _rhacm_use_noobaa | bool
  ansible.builtin.set_fact:
    _thanos_bucket: "{{ r_obc.resources[0].spec.bucketName }}"

# Step H-2b: AWS S3 path — native credentials from secrets
- name: "[HUB] Ensure S3 bucket exists for RHACM Thanos (AWS native)"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - not (_rhacm_use_noobaa | bool)
  amazon.aws.s3_bucket:
    name: "{{ ocp4_workload_capacity_planning_workshop_rhacm_thanos_bucket }}"
    region: "{{ aws_region | default('us-east-2') }}"
    state: present
    access_key: "{{ aws_access_key_id | default(lookup('env', 'AWS_ACCESS_KEY_ID')) }}"
    secret_key: "{{ aws_secret_access_key | default(lookup('env', 'AWS_SECRET_ACCESS_KEY')) }}"
  ignore_errors: true

- name: "[HUB] Set AWS S3 Thanos credentials"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - not (_rhacm_use_noobaa | bool)
  ansible.builtin.set_fact:
    _thanos_bucket: "{{ ocp4_workload_capacity_planning_workshop_rhacm_thanos_bucket }}"
    _thanos_access_key: "{{ aws_access_key_id | default(lookup('env', 'AWS_ACCESS_KEY_ID')) }}"
    _thanos_secret_key: "{{ aws_secret_access_key | default(lookup('env', 'AWS_SECRET_ACCESS_KEY')) }}"
    _thanos_endpoint: "s3.{{ aws_region | default('us-east-2') }}.amazonaws.com"
    _thanos_insecure: false

# Step H-3: Deploy MultiClusterObservability
- name: "[HUB] Ensure open-cluster-management-observability namespace exists"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: open-cluster-management-observability

- name: "[HUB] Create Thanos object storage secret"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: thanos-object-storage
        namespace: open-cluster-management-observability
      type: Opaque
      stringData:
        thanos.yaml: |
          type: s3
          config:
            bucket: "{{ _thanos_bucket }}"
            endpoint: "{{ _thanos_endpoint }}"
            insecure: {{ _thanos_insecure | bool }}
            access_key: "{{ _thanos_access_key }}"
            secret_key: "{{ _thanos_secret_key }}"

- name: "[HUB] Deploy RHACM MultiClusterObservability"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: observability.open-cluster-management.io/v1beta2
      kind: MultiClusterObservability
      metadata:
        name: observability
        namespace: open-cluster-management
      spec:
        observabilityAddonSpec:
          enableMetrics: true
        storageConfig:
          metricObjectStorage:
            name: thanos-object-storage
            key: thanos.yaml
          storageClass: "{{ ocp4_workload_capacity_planning_workshop_rhacm_storage_class }}"
          retentionConfig:
            retentionInLocal: "{{ ocp4_workload_capacity_planning_workshop_rhacm_retention_local }}"
            retentionResolutionRaw: "{{ ocp4_workload_capacity_planning_workshop_rhacm_retention_resolution }}"

- name: "[HUB] Wait for MultiClusterObservability to be ready"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: observability
    namespace: open-cluster-management
  register: r_mco
  retries: 60
  delay: 15
  until:
    - r_mco.resources is defined
    - r_mco.resources | length > 0
    - r_mco.resources[0].status is defined
    - r_mco.resources[0].status.conditions is defined
    - r_mco.resources[0].status.conditions | length > 0
    - >-
      r_mco.resources[0].status.conditions
      | selectattr('type', 'equalto', 'Ready')
      | map(attribute='status')
      | list | length > 0
      and
      (r_mco.resources[0].status.conditions
      | selectattr('type', 'equalto', 'Ready')
      | map(attribute='status')
      | list | first) == 'True'

# Step H-4: Get hub URLs for export
# RHACM 2.13+ uses a console plugin (no standalone multicloud-console route).
# The ACM UI is available at the OpenShift console /multicloud path.
- name: "[HUB] Get Grafana Observability route"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: grafana
    namespace: open-cluster-management-observability
  register: r_grafana_route
  retries: 30
  delay: 10
  until:
    - r_grafana_route.resources is defined
    - r_grafana_route.resources | length > 0

- name: "[HUB] Set hub URL facts"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.set_fact:
    # openshift_console_url already contains the full correct URL (no double-apps prefix)
    # RHACM multicloud UI lives under /multicloud on the OCP console in RHACM 2.x+
    _hub_rhacm_console: "{{ openshift_console_url | default('') }}/multicloud"
    _hub_grafana_url: >-
      https://{{ r_grafana_route.resources[0].spec.host
        if r_grafana_route.resources | length > 0
        else 'grafana-open-cluster-management-observability.' ~ openshift_cluster_ingress_domain | default('') }}

# Step H-5: Deploy Showroom lab guide on hub
- name: "[HUB] Deploy Showroom lab guide"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_showroom | bool
  ansible.builtin.include_role:
    name: agnosticd.core_workloads.ocp4_workload_showroom
  vars:
    ocp4_workload_showroom_namespace: "showroom-{{ guid }}"
    ocp4_workload_showroom_content_git_repo: "https://github.com/tosin2013/capacity-planning-lab-guide.git"
    ocp4_workload_showroom_content_git_repo_ref: "main"
    ocp4_workload_showroom_content_antora_playbook: "default-site.yml"
    ocp4_workload_showroom_content_title: "Strategic Capacity Planning & Forecasting for OpenShift"
    ocp4_workload_showroom_terminal_type: "wetty"
    ocp4_workload_showroom_wetty_ssh_bastion_login: true

# ============================================================
# STUDENT PATH — Sample apps + monitoring + simulation
# ============================================================

# Step S-0: Ensure ArgoCD application controller has cluster-admin
# The ocp4_workload_openshift_gitops role grants cluster-admin to the gitops SA,
# but the ArgoCD application-controller SA also needs it to deploy cluster-scoped
# resources (PriorityClasses, etc.) across arbitrary namespaces.
- name: "[STUDENT] Grant cluster-admin to ArgoCD application controller"
  when: not ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: argocd-application-controller-cluster-admin
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin
      subjects:
        - kind: ServiceAccount
          name: openshift-gitops-argocd-application-controller
          namespace: openshift-gitops

# Step S-1: Create workshop namespace
- name: "[STUDENT] Create workshop namespace"
  when: not ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
        labels:
          demo.redhat.com/application: capacity-workshop
          demo.redhat.com/guid: "{{ guid }}"

# Step S-2: Deploy workshop components via ArgoCD
- name: "[STUDENT] Deploy workshop via ArgoCD Application"
  when: not ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argocd-application.yaml.j2') }}"
  vars:
    _showroom_namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
    _target_cluster: "https://kubernetes.default.svc"
    _user: ""

- name: "[STUDENT] Wait for ArgoCD Application to sync"
  when: not ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: capacity-planning-workshop
    namespace: openshift-gitops
  register: r_argocd_app
  retries: 60
  delay: 10
  until:
    - r_argocd_app.resources is defined
    - r_argocd_app.resources | length > 0
    - r_argocd_app.resources[0].status is defined
    - r_argocd_app.resources[0].status.sync.status == "Synced"

# Step S-3: Wait for sample applications
# Cold-start note: on a fresh cluster all images must be pulled before pods become Available.
# Image pull time varies by registry latency; 25 minutes covers the worst-case cold start.
# The until condition requires at least one Deployment to exist (resources.length > 0) so
# the task will keep retrying harmlessly if ArgoCD hasn't created the Deployments yet.
- name: "[STUDENT] Wait for sample applications to be ready"
  when:
    - not ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_sample_apps | bool
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ ocp4_workload_capacity_planning_workshop_namespace }}"
    label_selectors:
      - demo.redhat.com/application=capacity-workshop
  register: r_sample_apps
  retries: 100
  delay: 15
  until:
    - r_sample_apps.resources is defined
    - r_sample_apps.resources | length > 0
    - >-
      r_sample_apps.resources
      | selectattr('spec.replicas', 'defined')
      | selectattr('spec.replicas', 'gt', 0)
      | selectattr('status.availableReplicas', 'defined')
      | list | length
      ==
      r_sample_apps.resources
      | selectattr('spec.replicas', 'defined')
      | selectattr('spec.replicas', 'gt', 0)
      | list | length

# Step S-4: Get student cluster Prometheus route
- name: "[STUDENT] Get Thanos querier route (student cluster Prometheus)"
  when: not ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: thanos-querier
    namespace: openshift-monitoring
  register: r_thanos_querier
  retries: 10
  delay: 5
  ignore_errors: true

# Step S-5: Register this cluster with hub RHACM and grant hub Grafana RBAC
# Both tasks run only when hub_api_url is provided, making the hub integration
# optional (skipped for standalone student deployments without a hub).
- name: "[STUDENT] Import cluster into hub RHACM and wire Grafana access"
  when:
    - not ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_hub_api_url | default('') | length > 0
  ansible.builtin.include_tasks: import_to_rhacm.yml

# ============================================================
# HUB PATH — Per-student htpasswd users for Grafana access
# ============================================================
# RHACM Observability Grafana uses oauth-proxy with auth.proxy mode and
# viewers_can_edit=true, so any authenticated OCP user can both view AND
# create/edit dashboards.  We create one htpasswd user per student slot
# (student-01 … student-N) with a shared password, and bind them to
# open-cluster-management:view which satisfies the oauth-proxy SAR gate
# ({resource: projects, verb: list}).

- name: "[HUB] Build htpasswd file content for student users"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.shell:
    cmd: |
      set -e
      HTPASSWD_FILE=$(mktemp)
      for i in $(seq -w 1 {{ ocp4_workload_capacity_planning_workshop_max_users | int }}); do
        USERNAME="{{ ocp4_workload_capacity_planning_workshop_user_basename }}-${i}"
        htpasswd -bBn "${USERNAME}" "{{ ocp4_workload_capacity_planning_workshop_hub_password }}" >> "${HTPASSWD_FILE}"
      done
      cat "${HTPASSWD_FILE}"
      rm -f "${HTPASSWD_FILE}"
  register: r_htpasswd_content
  changed_when: true

- name: "[HUB] Create htpasswd secret for student users in openshift-config"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: workshop-students-htpasswd
        namespace: openshift-config
      type: Opaque
      stringData:
        htpasswd: "{{ r_htpasswd_content.stdout }}"

- name: "[HUB] Patch cluster OAuth to add workshop htpasswd identity provider"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: config.openshift.io/v1
      kind: OAuth
      metadata:
        name: cluster
      spec:
        identityProviders:
          - name: workshop-students
            mappingMethod: claim
            type: HTPasswd
            htpasswd:
              fileData:
                name: workshop-students-htpasswd

- name: "[HUB] Wait for OAuth operator to reconcile after IDP change"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.pause:
    seconds: 30

- name: "[HUB] Create per-student ClusterRoleBindings for open-cluster-management:view-aggregate"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # open-cluster-management:view-aggregate satisfies the grafana-proxy SAR gate
  # (list projects).  viewers_can_edit=true in grafana.ini means these users can
  # also create and edit Grafana dashboards without needing a higher OCP role.
  #
  # Subject name uses un-padded item (user-1, user-2 …) to match the actual
  # HTPasswd username created by the hub workload.  The CRB name retains zero-padding
  # for readability/sorting but the subject MUST match the login name exactly.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "workshop-grafana-view-{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ '%02d' | format(item) }}"
        labels:
          demo.redhat.com/application: capacity-workshop
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: open-cluster-management:view-aggregate
      subjects:
        - kind: User
          apiGroup: rbac.authorization.k8s.io
          name: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item }}"
  loop: "{{ range(1, ocp4_workload_capacity_planning_workshop_max_users | int + 1) | list }}"
  loop_control:
    loop_var: item
    label: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item }}"

- name: "[HUB] Create ClusterRole: workshop-managedcluster-view"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # The rbac-query-proxy enforces RHACM RBAC on Thanos queries by checking
  # SubjectAccessReviews against managedclusters.  Without get/list on this
  # resource, the proxy injects cluster=~"()" — matching nothing — and all
  # Grafana panels show empty.  This minimal ClusterRole gives students just
  # enough access to see the clusters they are allowed to query.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: workshop-managedcluster-view
        labels:
          demo.redhat.com/application: capacity-workshop
      rules:
        - apiGroups:
            - cluster.open-cluster-management.io
          resources:
            - managedclusters
          verbs:
            - get
            - list
            - watch

- name: "[HUB] Per-student CRBs: workshop-managedcluster-view (sequential slot names)"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # Covers htpasswd slot names (student-01…student-N).
  # GUID-based CRBs (student-student-01) are created in the STUDENT workload.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "workshop-mcluster-view-{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ '%02d' | format(item) }}"
        labels:
          demo.redhat.com/application: capacity-workshop
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: workshop-managedcluster-view
      subjects:
        - kind: User
          apiGroup: rbac.authorization.k8s.io
          name: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item }}"
  loop: "{{ range(1, ocp4_workload_capacity_planning_workshop_max_users | int + 1) | list }}"
  loop_control:
    loop_var: item
    label: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item }}"

- name: "[HUB] Bind Grafana SA to open-cluster-management:view-aggregate"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # With auth.proxy + forwardHeaders in some RHACM versions the user bearer token
  # is not reliably forwarded from Grafana to the rbac-query-proxy, so the proxy
  # computes cluster=~"()" and dashboards show "No data".  Granting the Grafana SA
  # cluster-view access lets the proxy resolve ManagedCluster names via the SA token.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: workshop-grafana-sa-view-aggregate
        labels:
          demo.redhat.com/application: capacity-workshop
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: open-cluster-management:view-aggregate
      subjects:
        - kind: ServiceAccount
          name: grafana
          namespace: open-cluster-management-observability

- name: "[HUB] Bind Grafana SA to workshop-managedcluster-view"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: workshop-grafana-sa-managedcluster-view
        labels:
          demo.redhat.com/application: capacity-workshop
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: workshop-managedcluster-view
      subjects:
        - kind: ServiceAccount
          name: grafana
          namespace: open-cluster-management-observability

- name: "[HUB] Create Role: workshop-grafana-dashboard-editor in observability namespace"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # Allows students to oc apply custom Grafana dashboard ConfigMaps (Module 2 lab).
  # The role name workshop-grafana-dashboard-editor is referenced by the per-student
  # RoleBindings below.  import_to_rhacm.yml also references grafana-dashboard-creator
  # (legacy name) — that binding is harmless; this role covers the htpasswd slot usernames.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: workshop-grafana-dashboard-editor
        namespace: open-cluster-management-observability
        labels:
          demo.redhat.com/application: capacity-workshop
      rules:
        - apiGroups: [""]
          resources: ["configmaps"]
          verbs: ["get", "list", "create", "update", "patch", "delete"]

- name: "[HUB] Per-student RoleBindings: workshop-grafana-dashboard-editor (sequential slot names)"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # Binds user-1, user-2 … user-N (htpasswd slot names, no zero-padding) to the
  # workshop-grafana-dashboard-editor Role so they can create/update Grafana dashboard
  # ConfigMaps in the open-cluster-management-observability namespace (Module 2).
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "workshop-grafana-dashboard-editor-{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ '%02d' | format(item) }}"
        namespace: open-cluster-management-observability
        labels:
          demo.redhat.com/application: capacity-workshop
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: workshop-grafana-dashboard-editor
      subjects:
        - kind: User
          apiGroup: rbac.authorization.k8s.io
          name: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item }}"
  loop: "{{ range(1, ocp4_workload_capacity_planning_workshop_max_users | int + 1) | list }}"
  loop_control:
    loop_var: item
    label: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item }}"

- name: "[HUB] Collect managed cluster names for observability RBAC"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
  register: _hub_managed_clusters

- name: "[HUB] Per-user RoleBindings: view ClusterRole in each managed cluster namespace"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  # RHACM observability rbac-query-proxy performs a namespace-scoped SubjectAccessReview
  # against the managed cluster's namespace (e.g. student-01) on the hub to decide
  # which cluster names to inject into the cluster=~"..." Prometheus filter.
  # Without a RoleBinding in that namespace the filter stays cluster=~"()" and Grafana
  # shows "No data" for all dashboards.
  # Reference: https://docs.redhat.com/en/documentation/red_hat_advanced_cluster_management_for_kubernetes/2.11/html/access_control/access-control#observability-RBAC
  #
  # item.0 = managed cluster namespace (e.g. student-01 or local-cluster)
  # item.1 = user slot number (integer, 1-based)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "workshop-obs-view-{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item.1 }}"
        namespace: "{{ item.0 }}"
        labels:
          demo.redhat.com/application: capacity-workshop
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: view
      subjects:
        - kind: User
          apiGroup: rbac.authorization.k8s.io
          name: "{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item.1 }}"
  vars:
    _obs_cluster_namespaces: >-
      {{
        _hub_managed_clusters.resources
        | default([])
        | map(attribute='metadata.name')
        | list
      }}
    _obs_user_slots: "{{ range(1, ocp4_workload_capacity_planning_workshop_max_users | int + 1) | list }}"
  loop: "{{ _obs_cluster_namespaces | product(_obs_user_slots) | list }}"
  loop_control:
    loop_var: item
    label: "{{ item.0 }}/{{ ocp4_workload_capacity_planning_workshop_user_basename }}-{{ item.1 }}"

# ============================================================
# HUB PATH — Deploy RHACM Dev Grafana for interactive dashboard building
# ============================================================
# The Dev Grafana instance gives students a full-editor Grafana UI backed by
# the same Thanos datasource as production.  Students use it to explore and
# optionally build their own dashboards.  The pre-generated module dashboards
# (bundled in the lab guide examples) are applied by students with oc apply,
# so Dev Grafana being available is a teaching tool, not a provisioning dependency.
#
# setup-grafana-dev.sh --deploy:
#   - Clones the production Grafana Deployment/Service/Route/OAuthClient into
#     -dev variants with a 1Gi PVC for its SQLite database
#   - Removes ownerReferences so the MCO operator does not delete it
#   - Prints "Grafana dev URL: <hostname>" when finished

- name: "[HUB] Clone multicluster-observability-operator tools for Dev Grafana"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_dev_grafana | bool
  ansible.builtin.git:
    repo: https://github.com/stolostron/multicluster-observability-operator.git
    dest: /tmp/mco-tools
    depth: 1
    force: true

- name: "[HUB] Deploy Dev Grafana instance"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_dev_grafana | bool
  ansible.builtin.shell:
    cmd: bash setup-grafana-dev.sh --deploy
    chdir: /tmp/mco-tools/tools
  register: r_dev_grafana_deploy
  changed_when: true

- name: "[HUB] Show Dev Grafana deploy output"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_dev_grafana | bool
  ansible.builtin.debug:
    msg: "{{ r_dev_grafana_deploy.stdout_lines }}"

- name: "[HUB] Wait for grafana-dev pod to be ready"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_dev_grafana | bool
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: grafana-dev
    namespace: open-cluster-management-observability
  register: r_grafana_dev
  retries: 30
  delay: 10
  until:
    - r_grafana_dev.resources is defined
    - r_grafana_dev.resources | length > 0
    - r_grafana_dev.resources[0].status is defined
    - r_grafana_dev.resources[0].status.availableReplicas | default(0) | int >= 1

- name: "[HUB] Get Dev Grafana route"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_dev_grafana | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: grafana-dev
    namespace: open-cluster-management-observability
  register: r_dev_grafana_route

- name: "[HUB] Emit Dev Grafana URL to user_info"
  when:
    - ocp4_workload_capacity_planning_workshop_hub_mode | bool
    - ocp4_workload_capacity_planning_workshop_deploy_dev_grafana | bool
    - r_dev_grafana_route.resources | length > 0
  agnosticd.core.agnosticd_user_info:
    data:
      hub_dev_grafana_url: "https://{{ r_dev_grafana_route.resources[0].spec.host }}"

# ============================================================
# HUB PATH — Pre-create RHACM observability custom allowlist
# ============================================================
# The observability allowlist is an admin/operator responsibility.
# Students read and verify it in Module 5; they do not create it.
# This ConfigMap is the union of all metrics needed across every workshop
# module.  MCO auto-detects it and merges the entries into the
# metrics-collector --match args within ~2 minutes of creation.
#
# Why each group is here:
#   names/kube_pod_start_time          → Module 2 dashboard panels 1 & 2
#   names/kube_deployment_*            → Module 2 panel 3, Module 5 scale view
#   names/kube_horizontalpodauto*      → Module 5 HPA monitoring
#   names/kube_node_info               → Module 5 Panel 5 pod density (pods/node)
#   names/etcd_mvcc_db_total_size_*    → Module 5 Panel 6 etcd DB size gauge
#   matches/kube_pod_.*                → Modules 2–6 pod-level ksm metrics
#   matches/container_cpu_cfs_throttled → Module 3 throttling analysis
#   matches/container_cpu_usage_*      → Module 5 Panel 2B CPU usage vs requested
#
- name: "[HUB] Pre-create observability-metrics-custom-allowlist for all workshop modules"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: observability-metrics-custom-allowlist
        namespace: open-cluster-management-observability
        labels:
          demo.redhat.com/application: capacity-workshop
      data:
        metrics_list.yaml: |
          names:
            # Module 2 — pod velocity dashboard (panels 1 & 2)
            - kube_pod_start_time

            # Module 2 panel 3 + Module 5 deployment scale view
            - kube_deployment_spec_replicas
            - kube_deployment_status_replicas_available
            - kube_deployment_created

            # Module 5 — HPA monitoring panels
            - kube_horizontalpodautoscaler_spec_target_metric
            - kube_horizontalpodautoscaler_status_current_replicas
            - kube_horizontalpodautoscaler_status_desired_replicas

            # Module 5 Panel 5 — pod density (pods/node denominator)
            - kube_node_info

            # Module 5 Panel 6 — etcd DB size gauge (warn at 6 GB, limit 8 GB)
            # RHACM renames this to etcd_debugging_mvcc_db_total_size_in_bytes in Thanos
            # (see renames in observability-metrics-allowlist). Grafana queries must use
            # the etcd_debugging_* name, not the raw Prometheus name.
            - etcd_mvcc_db_total_size_in_bytes

          matches:
            # All pod-level kube-state-metrics — Modules 2, 3, 5, 6
            - __name__=~"kube_pod_.*"

            # CPU throttling — Module 3 right-sizing analysis
            - __name__="container_cpu_cfs_throttled_seconds_total"

            # Module 5 Panel 2B — actual CPU usage vs requested (fleet CPU gap)
            - __name__="container_cpu_usage_seconds_total"

# ============================================================
# HUB PATH — Verify Grafana student access RBAC
# Confirms that the two-layer RBAC model is in place before
# handing the environment to students:
#   Layer 1: user can list projects → passes oauth-proxy SAR gate
#   Layer 2: Grafana SA can list managedclusters → rbac-query-proxy shows data
# ============================================================

- name: "[HUB] Verify Layer 1 — student user-1 can list projects (oauth-proxy SAR)"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.command: >-
    oc auth can-i list projects
    --as={{ ocp4_workload_capacity_planning_workshop_user_basename }}-1
  register: r_grafana_layer1_check
  changed_when: false
  failed_when: >-
    r_grafana_layer1_check.rc != 0 or
    r_grafana_layer1_check.stdout | trim != 'yes'

- name: "[HUB] Verify Layer 2 — Grafana SA can list managed clusters (rbac-query-proxy)"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.command: >-
    oc auth can-i list managedclusters
    --as=system:serviceaccount:open-cluster-management-observability:grafana
  register: r_grafana_layer2_check
  changed_when: false
  failed_when: >-
    r_grafana_layer2_check.rc != 0 or
    r_grafana_layer2_check.stdout | trim != 'yes'

- name: "[HUB] Report Grafana RBAC verification results"
  when: ocp4_workload_capacity_planning_workshop_hub_mode | bool
  ansible.builtin.debug:
    msg: |
      Grafana access RBAC verified:
        Layer 1 (user-1 list projects):        {{ r_grafana_layer1_check.stdout | trim }}
        Layer 2 (Grafana SA list clusters):    {{ r_grafana_layer2_check.stdout | trim }}
      Students can log in at: {{ _hub_grafana_url | default('') }}
      Username pattern: {{ ocp4_workload_capacity_planning_workshop_user_basename }}-NN
      Password: {{ ocp4_workload_capacity_planning_workshop_hub_password }}
      Note: viewers_can_edit=true is intentional — students create dashboards in Modules 2 and 5.

