---
- name: Remove DataProtectionApplication CR
  kubernetes.core.k8s:
    api_version: oadp.openshift.io/v1alpha1
    kind: DataProtectionApplication
    name: "{{ ocp4_workload_oadp_dpa_name }}"
    namespace: "{{ ocp4_workload_oadp_namespace }}"
    state: absent
  ignore_errors: true

- name: Remove OADP operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: remove
    install_operator_name: redhat-oadp-operator
    install_operator_namespace: "{{ ocp4_workload_oadp_namespace }}"
    install_operator_channel: "{{ ocp4_workload_oadp_channel }}"
    install_operator_catalog: redhat-operators
    install_operator_catalogsource_setup: >-
      {{ ocp4_workload_oadp_use_catalog_snapshot | default(false) }}
    install_operator_catalogsource_name: >-
      {{ ocp4_workload_oadp_catalogsource_name | default('') }}
    install_operator_catalogsource_namespace: "{{ ocp4_workload_oadp_namespace }}"
    install_operator_catalogsource_image: >-
      {{ ocp4_workload_oadp_catalogsource_image | default('') }}
    install_operator_catalogsource_image_tag: >-
      {{ ocp4_workload_oadp_catalogsource_image_tag | default('') }}

- name: Remove openshift-adp namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_oadp_namespace }}"
    state: absent
