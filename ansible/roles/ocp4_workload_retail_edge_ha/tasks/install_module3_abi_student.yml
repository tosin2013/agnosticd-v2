---
# Per-student ABI sub-task (called from install_module3_abi.yml)
# Loop variable: _student_num (integer, e.g. 1, 2)
# ---------------------------------------------------------------------------

- name: Set per-student facts
  ansible.builtin.set_fact:
    _student_id: "{{ '%02d' % _student_num }}"
    _student_ns: "retail-edge-student-{{ '%02d' % _student_num }}"
    # Central kubevirt-redfish instance at 10.10.10.200 manages all student namespaces.
    # Per-student authentication username differentiates chassis access.
    _redfish_ip: "10.10.10.200"
    _redfish_username: "admin-s{{ '%02d' % _student_num }}"
    _abi_work_dir: "{{ r_abi_temp.path }}/student-{{ '%02d' % _student_num }}"
    _twonode_api_vip: "10.103.0.100"
    _twonode_ingress_vip: "10.103.0.101"
    _twonode_base_domain: "s{{ '%02d' % _student_num }}.cluster-4qn44.dynamic2.redhatworkshops.io"

- name: "Student {{ _student_id }} — Create ABI work directory"
  ansible.builtin.file:
    path: "{{ _abi_work_dir }}"
    state: directory
    mode: '0755'

- name: "Student {{ _student_id }} — Wait for central kubevirt-redfish LoadBalancer IP"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    label_selectors:
      - "app.kubernetes.io/name=kubevirt-redfish"
    namespace: "retail-edge-infrastructure"
  register: r_redfish_svc
  retries: 30
  delay: 10
  until:
    - r_redfish_svc.resources | length > 0
    - r_redfish_svc.resources[0].status.loadBalancer.ingress is defined
    - r_redfish_svc.resources[0].status.loadBalancer.ingress | length > 0

- name: "Student {{ _student_id }} — Write install-config.yaml"
  ansible.builtin.copy:
    dest: "{{ _abi_work_dir }}/install-config.yaml"
    mode: '0644'
    content: |
      apiVersion: v1
      baseDomain: {{ _twonode_base_domain }}
      metadata:
        name: twonode-s{{ _student_id }}
      featureSet: TechPreviewNoUpgrade
      compute:
      - hyperthreading: Enabled
        name: worker
        replicas: 0
      controlPlane:
        hyperthreading: Enabled
        name: master
        replicas: 2
        fencing:
          credentials:
          - hostname: node1
            address: https://{{ _redfish_ip }}/redfish/v1/Systems/rhcos-twonode-node1
            username: {{ _redfish_username }}
            password: adminpass
            certificateVerification: Disabled
          - hostname: node2
            address: https://{{ _redfish_ip }}/redfish/v1/Systems/rhcos-twonode-node2
            username: {{ _redfish_username }}
            password: adminpass
            certificateVerification: Disabled
      networking:
        clusterNetwork:
        - cidr: 10.128.0.0/14
          hostPrefix: 23
        machineNetwork:
        - cidr: 10.103.0.0/24
        serviceNetwork:
        - 172.30.0.0/16
        networkType: OVNKubernetes
      platform:
        none: {}
      fips: false
      pullSecret: '{{ ocp4_workload_retail_edge_ha_pull_secret }}'
      sshKey: '{{ _twonode_ssh_pubkey }}'

- name: "Student {{ _student_id }} — Write agent-config.yaml"
  ansible.builtin.copy:
    dest: "{{ _abi_work_dir }}/agent-config.yaml"
    mode: '0644'
    content: |
      apiVersion: v1alpha1
      kind: AgentConfig
      metadata:
        name: twonode-s{{ _student_id }}
      rendezvousIP: 10.103.0.10
      additionalNTPSources:
      - time.cloudflare.com
      hosts:
      - hostname: node1
        role: master
        interfaces:
        - name: eth1
          macAddress: "52:54:00:{{ _student_num | int | to_json | hash('md5') | truncate(2, true, '') }}:01:01"
        bmc:
          address: redfish-virtualmedia://{{ _redfish_ip }}/redfish/v1/Systems/rhcos-twonode-node1
          username: {{ _redfish_username }}
          password: adminpass
          disableCertificateVerification: true
      - hostname: node2
        role: master
        interfaces:
        - name: eth1
          macAddress: "52:54:00:{{ _student_num | int | to_json | hash('md5') | truncate(2, true, '') }}:02:01"
        bmc:
          address: redfish-virtualmedia://{{ _redfish_ip }}/redfish/v1/Systems/rhcos-twonode-node2
          username: {{ _redfish_username }}
          password: adminpass
          disableCertificateVerification: true

# NMStateConfig manifests provide static network config without requiring
# nmstatectl on the bastion. The installer includes them in the ISO and
# the agent applies them on boot (nmstate is available in RHCOS).
- name: "Student {{ _student_id }} — Create cluster-manifests directory"
  ansible.builtin.file:
    path: "{{ _abi_work_dir }}/cluster-manifests"
    state: directory
    mode: '0755'

- name: "Student {{ _student_id }} — Write NMStateConfig for node1"
  ansible.builtin.copy:
    dest: "{{ _abi_work_dir }}/cluster-manifests/nmstateconfig-node1.yaml"
    mode: '0644'
    content: |
      apiVersion: agent-install.openshift.io/v1beta1
      kind: NMStateConfig
      metadata:
        name: node1
        namespace: NONE
      spec:
        config:
          interfaces:
          - name: eth1
            type: ethernet
            state: up
            ipv4:
              enabled: true
              address:
              - ip: 10.103.0.10
                prefix-length: 24
              dhcp: false
        interfaces:
        - name: eth1
          macAddress: "52:54:00:{{ _student_num | int | to_json | hash('md5') | truncate(2, true, '') }}:01:01"

- name: "Student {{ _student_id }} — Write NMStateConfig for node2"
  ansible.builtin.copy:
    dest: "{{ _abi_work_dir }}/cluster-manifests/nmstateconfig-node2.yaml"
    mode: '0644'
    content: |
      apiVersion: agent-install.openshift.io/v1beta1
      kind: NMStateConfig
      metadata:
        name: node2
        namespace: NONE
      spec:
        config:
          interfaces:
          - name: eth1
            type: ethernet
            state: up
            ipv4:
              enabled: true
              address:
              - ip: 10.103.0.11
                prefix-length: 24
              dhcp: false
        interfaces:
        - name: eth1
          macAddress: "52:54:00:{{ _student_num | int | to_json | hash('md5') | truncate(2, true, '') }}:02:01"

- name: "Student {{ _student_id }} — Generate ABI agent ISO"
  ansible.builtin.command:
    cmd: "{{ r_abi_temp.path }}/openshift-install agent create image --dir {{ _abi_work_dir }}"
  register: r_abi_create_image
  changed_when: r_abi_create_image.rc == 0

- name: "Student {{ _student_id }} — Import agent ISO as DataVolume"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: agent-iso-s{{ _student_id }}
        namespace: "{{ _student_ns }}"
        labels:
          app.kubernetes.io/part-of: retail-edge-ha-workshop
          module: module3
          student-id: "{{ _student_id }}"
      spec:
        source:
          upload: {}
        storage:
          resources:
            requests:
              storage: 2Gi
          storageClassName: ocs-external-storagecluster-ceph-rbd-immediate
          accessModes:
            - ReadWriteOnce

- name: "Student {{ _student_id }} — Wait for agent ISO DataVolume to be UploadReady"
  kubernetes.core.k8s_info:
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: agent-iso-s{{ _student_id }}
    namespace: "{{ _student_ns }}"
  register: r_agent_iso_dv
  retries: 30
  delay: 10
  until:
    - r_agent_iso_dv.resources | length > 0
    - r_agent_iso_dv.resources[0].status.phase is defined
    - r_agent_iso_dv.resources[0].status.phase == "UploadReady"

- name: "Student {{ _student_id }} — Upload agent ISO via CDI upload proxy"
  ansible.builtin.command:
    cmd: >-
      {{ r_abi_temp.path }}/virtctl image-upload dv agent-iso-s{{ _student_id }}
      --namespace {{ _student_ns }}
      --image-path {{ _abi_work_dir }}/agent.x86_64.iso
      --server {{ openshift_api_url }}
      --token {{ _ocp4_workload_retail_edge_ha_admin_token }}
      --insecure-skip-tls-verify
      --insecure
      --wait-secs=300
  register: r_iso_upload
  changed_when: r_iso_upload.rc == 0

# Suspend ArgoCD automated sync for vms-module3 before patching the VM specs.
# ArgoCD will revert our CDROM disk changes and runStrategy changes if auto-sync
# is enabled (Git has VMs in Halted state with no CDROM disk).
# Use JSON patch (oc) to remove only the 'automated' field without touching
# the rest of syncPolicy (syncOptions, retry). Ignore error if already removed.
- name: "Student {{ _student_id }} — Suspend ArgoCD auto-sync for vms-module3"
  ansible.builtin.command:
    cmd: >-
      oc patch application.argoproj.io retail-edge-ha-vms-module3
      -n openshift-gitops
      --type=json
      -p '[{"op": "remove", "path": "/spec/syncPolicy/automated"}]'
      --server {{ openshift_api_url }}
      --token {{ _ocp4_workload_retail_edge_ha_admin_token }}
      --insecure-skip-tls-verify
  register: r_argocd_suspend
  changed_when: "'patched' in r_argocd_suspend.stdout"
  # Ignore failure if automated field is already absent (idempotent)
  ignore_errors: true

# Patch both VMs to add the agent ISO as a CDROM disk (bootOrder 1) before starting.
# The patch must include ALL existing disks/volumes because strategic merge patch
# on CRDs replaces the entire array. We preserve rootdisk and cloudinitdisk entries.
- name: "Student {{ _student_id }} — Add agent ISO CDROM to node1 VM spec"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: rhcos-twonode-node1
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        template:
          spec:
            domain:
              devices:
                disks:
                  - name: agent-cdrom
                    cdrom:
                      bus: sata
                    bootOrder: 1
                  - name: rootdisk
                    disk:
                      bus: virtio
                    bootOrder: 2
            volumes:
              - name: agent-cdrom
                dataVolume:
                  name: agent-iso-s{{ _student_id }}
              - name: rootdisk
                dataVolume:
                  name: rhcos-twonode-node1-disk
              - name: cloudinitdisk
                cloudInitNoCloud:
                  networkData: |
                    version: 2
                    ethernets:
                      eth1:
                        addresses:
                        - 10.103.0.10/24

- name: "Student {{ _student_id }} — Add agent ISO CDROM to node2 VM spec"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: rhcos-twonode-node2
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        template:
          spec:
            domain:
              devices:
                disks:
                  - name: agent-cdrom
                    cdrom:
                      bus: sata
                    bootOrder: 1
                  - name: rootdisk
                    disk:
                      bus: virtio
                    bootOrder: 2
            volumes:
              - name: agent-cdrom
                dataVolume:
                  name: agent-iso-s{{ _student_id }}
              - name: rootdisk
                dataVolume:
                  name: rhcos-twonode-node2-disk
              - name: cloudinitdisk
                cloudInitNoCloud:
                  networkData: |
                    version: 2
                    ethernets:
                      eth1:
                        addresses:
                        - 10.103.0.11/24

- name: "Student {{ _student_id }} — Start node1 VM (boot from ISO)"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: rhcos-twonode-node1
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        runStrategy: Always

- name: "Student {{ _student_id }} — Start node2 VM (boot from ISO)"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: rhcos-twonode-node2
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        runStrategy: Always

- name: "Student {{ _student_id }} — Wait for OCP two-node installation to complete (≈60 min)"
  ansible.builtin.command:
    cmd: "{{ r_abi_temp.path }}/openshift-install agent wait-for install-complete --dir {{ _abi_work_dir }} --log-level=info"
  register: r_abi_install_complete
  changed_when: false
  # ABI installation takes 45-75 minutes for two-node OCP.
  # Run synchronously (no async) — async job files don't persist reliably in the EE.
  timeout: 7200

- name: "Student {{ _student_id }} — Print installation result"
  ansible.builtin.debug:
    msg:
      - "Two-node OCP installation complete for student {{ _student_id }}"
      - "API URL: https://api.twonode-s{{ _student_id }}.{{ _twonode_base_domain }}:6443"
      - "kubeconfig: {{ _abi_work_dir }}/auth/kubeconfig"

- name: "Student {{ _student_id }} — Stop VMs (prepare for CDROM removal)"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ item }}"
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        runStrategy: Halted
  loop:
    - rhcos-twonode-node1
    - rhcos-twonode-node2

- name: "Student {{ _student_id }} — Wait for VMs to stop"
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ item }}"
    namespace: "{{ _student_ns }}"
  register: r_vmi_stopped
  retries: 30
  delay: 10
  until: r_vmi_stopped.resources | length == 0
  loop:
    - rhcos-twonode-node1
    - rhcos-twonode-node2
  ignore_errors: true

# Remove agent ISO CDROM from VM spec before restarting (boot from installed disk).
# Use JSON patch to remove the cdrom disk entry and restore single-disk boot.
- name: "Student {{ _student_id }} — Remove agent ISO CDROM from node1 VM spec"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: rhcos-twonode-node1
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        template:
          spec:
            domain:
              devices:
                disks:
                  - name: rootdisk
                    disk:
                      bus: virtio
                    bootOrder: 1
            volumes:
              - name: rootdisk
                dataVolume:
                  name: rhcos-twonode-node1-disk
              - name: cloudinitdisk
                cloudInitNoCloud:
                  networkData: |
                    version: 2
                    ethernets:
                      eth1:
                        addresses:
                        - 10.103.0.10/24

- name: "Student {{ _student_id }} — Remove agent ISO CDROM from node2 VM spec"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: rhcos-twonode-node2
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        template:
          spec:
            domain:
              devices:
                disks:
                  - name: rootdisk
                    disk:
                      bus: virtio
                    bootOrder: 1
            volumes:
              - name: rootdisk
                dataVolume:
                  name: rhcos-twonode-node2-disk
              - name: cloudinitdisk
                cloudInitNoCloud:
                  networkData: |
                    version: 2
                    ethernets:
                      eth1:
                        addresses:
                        - 10.103.0.11/24

- name: "Student {{ _student_id }} — Restart VMs (boot from installed disk)"
  kubernetes.core.k8s:
    state: patched
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ item }}"
    namespace: "{{ _student_ns }}"
    definition:
      spec:
        runStrategy: Always
  loop:
    - rhcos-twonode-node1
    - rhcos-twonode-node2

# Re-enable ArgoCD auto-sync after installation. The VMs are now running OCP.
# ArgoCD will see the VMs as OutOfSync (runStrategy: Always vs Halted in Git)
# but since selfHeal=true it will try to stop them again. So we leave sync paused
# and rely on manual sync for day-2 operations on the two-node OCP cluster.
# This is intentional for the workshop PoC: VMs must stay running as OCP nodes.
- name: "Student {{ _student_id }} — Leave ArgoCD sync paused for vms-module3 (VMs are OCP nodes)"
  ansible.builtin.debug:
    msg: >-
      ArgoCD auto-sync for retail-edge-ha-vms-module3 remains paused.
      The two-node OCP VMs are now running as cluster nodes.
      Manual ArgoCD sync would stop the VMs (Git has runStrategy: Halted).
      To re-enable: oc patch application retail-edge-ha-vms-module3 -n openshift-gitops
      --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'

- name: "Student {{ _student_id }} — Store kubeconfig as Secret in student namespace"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: twonode-kubeconfig
        namespace: "{{ _student_ns }}"
        labels:
          app.kubernetes.io/part-of: retail-edge-ha-workshop
          module: module3
      type: Opaque
      stringData:
        kubeconfig: "{{ lookup('file', _abi_work_dir + '/auth/kubeconfig') }}"
        kubeadmin-password: "{{ lookup('file', _abi_work_dir + '/auth/kubeadmin-password') }}"
        api-url: "https://api.twonode-s{{ _student_id }}.{{ _twonode_base_domain }}:6443"
